<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 招聘助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0f2f5;font-family:-apple-system,BlinkMacSystemFont,sans-serif;height:100vh;display:flex;justify-content:center;align-items:center}
#app{width:100%;max-width:800px;height:100vh;display:flex;flex-direction:column;background:#fff;box-shadow:0 0 40px rgba(0,0,0,.06)}
header{padding:16px 24px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:12px}
header .logo{width:32px;height:32px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px}
header h1{font-size:17px;font-weight:600;flex:1}
header .dot{width:7px;height:7px;border-radius:50%;background:#22c55e}

/* JD bar */
.jd-wrap{padding:10px 24px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;font-size:13px}
.jd-wrap .tag{padding:3px 8px;border-radius:4px;background:#eef2ff;color:#2563eb;font-size:11px;font-weight:600}
.jd-wrap .stat{color:#999;font-size:12px;flex:1}
.jd-wrap .btn{padding:4px 12px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;color:#555;transition:.15s}
.jd-wrap .btn:hover{border-color:#2563eb;color:#2563eb}
.jd-panel{display:none;padding:16px 24px;border-bottom:1px solid #f0f0f0;flex-direction:column;gap:10px;background:#fafafa}
.jd-panel.show{display:flex}
.jd-panel textarea{width:100%;min-height:100px;padding:12px;border:1px solid #e5e7eb;border-radius:8px;resize:vertical;font-size:13px;font-family:inherit;outline:0;transition:.15s}
.jd-panel textarea:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.jd-panel .row{display:flex;gap:8px}
.jd-panel .row button{padding:6px 16px;border:0;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}
.jd-panel .primary{background:#2563eb;color:#fff}
.jd-panel .primary:hover{background:#1d4ed8}
.jd-panel .danger{background:#fef2f2;color:#dc2626}
.jd-panel .danger:hover{background:#fee2e2}
.jd-panel .ghost{background:#f3f4f6;color:#6b7280}
.jd-panel .ghost:hover{background:#e5e7eb}

/* Messages */
.msgs{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.msgs::-webkit-scrollbar{width:5px}
.msgs::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:4px}
.msg{max-width:78%;clear:both}
.msg.user{float:right}
.msg.ai{float:left}
.msg .b{padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;white-space:pre-wrap}
.msg.user .b{background:#2563eb;color:#fff;border-bottom-right-radius:4px}
.msg.ai .b{background:#f3f4f6;color:#1a1a1a;border-bottom-left-radius:4px;border:1px solid #f0f0f0}
.msg.err .b{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.clr{clear:both}
.empty{padding:80px 0;text-align:center;color:#bbb;font-size:14px;width:100%}

/* Input */
.btm{padding:16px 24px 20px;border-top:1px solid #f0f0f0;display:flex;flex-direction:column;gap:8px}
.inp-wrap{display:flex;gap:8px;align-items:flex-end}
.inp-wrap textarea{flex:1;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:10px;resize:none;font-size:14px;font-family:inherit;outline:0;line-height:1.5;max-height:100px;transition:.2s}
.inp-wrap textarea:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.inp-wrap button{width:40px;height:40px;border:0;border-radius:10px;background:#2563eb;color:#fff;cursor:pointer;font-size:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s}
.inp-wrap button:hover{background:#1d4ed8}
.inp-wrap button:disabled{background:#d1d5db;cursor:not-allowed}
.tools{display:flex;gap:8px;align-items:center}
.tools label{padding:5px 14px;border:1px solid #e5e7eb;border-radius:6px;cursor:pointer;font-size:12px;color:#6b7280;transition:.15s}
.tools label:hover{border-color:#2563eb;color:#2563eb}
.tools input{display:none}
.tools .clear-hint{background:none;border:0;font-size:12px;color:#bbb;cursor:pointer;padding:4px 8px;border-radius:4px;margin-left:auto}
.tools .clear-hint:hover{color:#dc2626;background:#fef2f2}
</style>
</head>
<body>
<div id="app">
<header>
<div class="logo">H</div>
<h1>AI 招聘助手</h1>
<div class="dot"></div>
</header>

<div class="jd-wrap">
<span class="tag">JD</span>
<span class="stat" id="jdStat">未设置</span>
<button class="btn" onclick="toggleJD()">管理</button>
</div>
<div class="jd-panel" id="jdPanel">
<textarea id="jdInput" placeholder="粘贴岗位 JD 内容..." rows="3"></textarea>
<div class="row">
<button class="primary" onclick="saveJD()">保存 JD</button>
<button class="danger" onclick="clearJD()">清空</button>
<button class="ghost" onclick="toggleJD()">关闭</button>
</div>
</div>

<div class="msgs" id="msgs">
<div class="empty">发送消息或上传简历文件</div>
</div>

<div class="btm">
<div class="inp-wrap">
<textarea id="input" rows="2" placeholder="输入内容，Enter 发送" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
<button id="sendBtn" onclick="send()">→</button>
</div>
<div class="tools">
<label>+ 上传简历文件 <input type="file" accept=".pdf,.docx,.txt" onchange="upload(this)"></label>
<button class="clear-hint" onclick="clearHistory()">清除会话</button>
</div>
</div>
</div>

<script>
const API = "http://127.0.0.1:8000";
const msgs = document.getElementById("msgs");
const inp = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const jdPanel = document.getElementById("jdPanel");
const jdInput = document.getElementById("jdInput");
const jdStat = document.getElementById("jdStat");
let loading = false;

function addMsg(role, content) {
    const e = msgs.querySelector(".empty");
    if (e) e.remove();
    const w = document.createElement("div");
    w.className = "msg " + role;
    w.innerHTML = `<div class="b">${content.replace(/</g,"&lt;").replace(/\n/g,"<br>")}</div><div class="clr"></div>`;
    msgs.appendChild(w);
    msgs.scrollTop = msgs.scrollHeight;
}

function clearHistory() {
    if (!confirm("确认清除所有对话记录？")) return;
    msgs.innerHTML = '<div class="empty">发送消息或上传简历文件</div>';
    inp.value = "";
}

function toggleJD() {
    jdPanel.classList.toggle("show");
    if (jdPanel.classList.contains("show")) loadJD();
}

async function loadJD() {
    try {
        const r = await fetch(API + "/api/jd/default").then(r => r.json());
        jdInput.value = r.jd || "";
        jdStat.textContent = r.jd ? "已设置" : "未设置";
    } catch(e) { jdInput.value = ""; }
}

async function saveJD() {
    const t = jdInput.value.trim();
    await fetch(API + "/api/jd/save", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({session_id: "default", jd: t})
    });
    jdStat.textContent = t ? "已设置" : "未设置";
    addMsg("ai", t ? "JD 已保存" : "JD 已清空");
    jdPanel.classList.remove("show");
}

async function clearJD() {
    if (!confirm("确认清除 JD？")) return;
    jdInput.value = "";
    await saveJD();
}

async function send() {
    const t = inp.value.trim();
    if (!t || loading) return;
    inp.value = "";
    addMsg("user", t);
    loading = true;
    sendBtn.disabled = true;
    try {
        const r = await fetch(API + "/api/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
        body: JSON.stringify({session_id: "default", input: t})
        }).then(r => r.json());
        addMsg("ai", r.reply || "(无回复)");
    } catch(e) {
        addMsg("err", "请求失败: " + e.message);
    }
    loading = false;
    sendBtn.disabled = false;
    inp.focus();
}

async function upload(el) {
    const f = el.files[0];
    if (!f) return;
    el.value = "";
    addMsg("user", "[上传] " + f.name);
    loading = true;
    sendBtn.disabled = true;
    try {
        const fd = new FormData();
        fd.append("file", f); fd.append("session_id", "default");
        const r = await fetch(API + "/api/upload", {method: "POST", body: fd}).then(r => r.json());
        addMsg("ai", r.reply || "解析完成");
    } catch(e) {
        addMsg("err", "上传失败: " + e.message);
    }
    loading = false;
    sendBtn.disabled = false;
}
</script>
</body>
</html>
