<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 招聘助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f5;height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:720px;display:flex;flex-direction:column;height:100vh;background:#fff;box-shadow:0 0 20px rgba(0,0,0,.06)}
hdr{display:flex;align-items:center;gap:10px;padding:14px 20px;border-bottom:1px solid #eee}
hdr .l{width:30px;height:30px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
hdr h1{font-size:16px;font-weight:600;flex:1}
hdr .s{width:7px;height:7px;border-radius:50%;background:#22c55e}

/* JD 栏 */
.jd-bar{padding:8px 20px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px;font-size:13px}
.jd-bar .tag{padding:3px 10px;border-radius:6px;background:#eef2ff;color:#2563eb;font-size:12px;font-weight:500}
.jd-bar .jd-btn{padding:4px 12px;border:1px solid #e0e0e0;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;color:#666}
.jd-bar .jd-btn:hover{border-color:#2563eb;color:#2563eb}
.jd-bar .jd-stat{color:#999;font-size:12px;margin-left:auto}
.jd-panel{display:none;padding:12px 20px;border-bottom:1px solid #eee;flex-direction:column;gap:8px}
.jd-panel.show{display:flex}
.jd-panel textarea{width:100%;height:120px;padding:10px;border:1.5px solid #e0e0e0;border-radius:8px;resize:vertical;font-size:13px;font-family:inherit;outline:0}
.jd-panel textarea:focus{border-color:#2563eb}
.jd-panel .row{display:flex;gap:8px}
.jd-panel .row button{padding:6px 16px;border:0;border-radius:8px;cursor:pointer;font-size:13px}
.jd-panel .save{background:#2563eb;color:#fff}
.jd-panel .clear{background:#fef2f2;color:#dc2626}
.jd-panel .close{background:#f0f0f0;color:#666}

/* 消息 */
.msgs{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.msgs .e{text-align:center;color:#aaa;padding:40px;font-size:14px}
.msg{padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;max-width:88%;white-space:pre-wrap}
.msg.u{background:#2563eb;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.a{background:#f0f0f0;color:#1a1a1a;align-self:flex-start;border-bottom-left-radius:4px}
.msg.e{background:#fef2f2;color:#dc2626;align-self:flex-start}

/* 底部 */
.btm{padding:12px 20px 16px;border-top:1px solid #eee;display:flex;flex-direction:column;gap:8px}
.inp{display:flex;gap:8px}
.inp textarea{flex:1;padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:10px;resize:none;font-size:14px;font-family:inherit;outline:0;line-height:1.5;max-height:100px}
.inp textarea:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.inp button{width:40px;height:40px;border:0;border-radius:10px;background:#2563eb;color:#fff;cursor:pointer;font-size:16px;flex-shrink:0}
.inp button:disabled{background:#ccc;cursor:not-allowed}
.up{display:flex;gap:8px}
.up label{padding:6px 14px;border:1px solid #e0e0e0;border-radius:8px;cursor:pointer;font-size:13px;color:#666;transition:.15s}
.up label:hover{border-color:#2563eb;color:#2563eb}
.up input{display:none}
</style>
</head>
<body>
<div id="app">
<hdr><div class="l">H</div><h1>AI 招聘助手</h1><div class="s"></div></hdr>

<div class="jd-bar">
<span class="tag">JD</span>
<span id="jdStatus" class="jd-stat">未设置</span>
<button class="jd-btn" onclick="toggleJD()">管理 JD</button>
</div>

<div class="jd-panel" id="jdPanel">
<textarea id="jdInput" placeholder="粘贴岗位 JD 内容..."></textarea>
<div class="row">
<button class="save" onclick="saveJD()">保存 JD</button>
<button class="clear" onclick="clearJD()">清空 JD</button>
<button class="close" onclick="toggleJD()">关闭</button>
</div>
</div>

<div class="msgs" id="msgs">
<div class="e">发送消息或上传简历文件</div>
</div>

<div class="btm">
<div class="inp">
<textarea id="input" rows="2" placeholder="输入内容，Enter 发送"></textarea>
<button id="sendBtn" onclick="send()">→</button>
</div>
<div class="up">
<label>+ 上传简历文件 <input type="file" accept=".pdf,.docx,.txt" onchange="upload(this)"></label>
</div>
</div>
</div>

<script>
const API = 'http://127.0.0.1:8000';
const msgs = document.getElementById('msgs');
const inp = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const jdPanel = document.getElementById('jdPanel');
const jdInput = document.getElementById('jdInput');
const jdStatus = document.getElementById('jdStatus');
let loading = false;

inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
    }
});

function addMsg(role, content) {
    const e = msgs.querySelector('.e');
    if (e) e.remove();
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    d.textContent = content;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
}

function toggleJD() {
    jdPanel.classList.toggle('show');
    if (jdPanel.classList.contains('show')) loadJD();
}

async function loadJD() {
    try {
        const r = await fetch(API + '/api/jd/default').then(r => r.json());
        jdInput.value = r.jd || '';
        jdStatus.textContent = r.jd ? '已设置' : '未设置';
    } catch(e) { jdInput.value = ''; }
}

async function saveJD() {
    const text = jdInput.value.trim();
    await fetch(API + '/api/jd/save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({session_id: 'default', jd: text})
    });
    jdStatus.textContent = text ? '已设置' : '未设置';
    addMsg('a', 'JD 已' + (text ? '保存' : '清空'));
    jdPanel.classList.remove('show');
}

async function clearJD() {
    if (!confirm('确认清除 JD？')) return;
    jdInput.value = '';
    await saveJD();
}

async function send() {
    const t = inp.value.trim();
    if (!t || loading) return;
    inp.value = '';
    addMsg('u', t);
    loading = true; sendBtn.disabled = true;
    try {
        const r = await fetch(API + '/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({input: t})
        }).then(r => r.json());
        addMsg('a', r.reply || '(无回复)');
    } catch(e) { addMsg('e', '请求失败: ' + e.message); }
    loading = false; sendBtn.disabled = false; inp.focus();
}

async function upload(el) {
    const f = el.files[0];
    if (!f) return;
    el.value = '';
    addMsg('u', '[上传] ' + f.name);
    loading = true; sendBtn.disabled = true;
    try {
        const fd = new FormData();
        fd.append('file', f);
        const r = await fetch(API + '/api/upload', {method: 'POST', body: fd}).then(r => r.json());
        addMsg('a', r.reply || '解析完成');
    } catch(e) { addMsg('e', '上传失败: ' + e.message); }
    loading = false; sendBtn.disabled = false;
}
</script>
</body>
</html>
